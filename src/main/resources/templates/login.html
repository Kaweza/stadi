<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Music Platform</title>

  <!-- Favicons -->
  <link href="/admin/img/favicon.png" rel="icon">

  <!-- Bootstrap core CSS -->
  <link href="/admin/lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <!-- External CSS -->
  <link href="/admin/lib/font-awesome/css/font-awesome.css" rel="stylesheet">

  <!-- Custom styles -->
  <link href="/admin/css/style.css" rel="stylesheet">
  <link href="/admin/css/style-responsive.css" rel="stylesheet">
</head>

<body>

  <!-- LOGIN PAGE -->
  <div id="login-page">
    <div class="container">

      <!-- 🔐 SPRING SECURITY LOGIN FORM -->
      <form class="form-login" th:action="@{/login}" method="post">

        <h2 class="form-login-heading">ADMIN SIGN IN</h2>

        <div class="login-wrap">

          <!-- ERROR MESSAGE -->
          <div th:if="${param.error}" class="alert alert-danger">
            Invalid email or password
          </div>

          <!-- LOGOUT MESSAGE -->
          <div th:if="${param.logout}" class="alert alert-success">
            You have been logged out
          </div>

          <!-- EMAIL -->
          <input type="email"
                 name="username"
                 class="form-control"
                 placeholder="Email address"
                 autofocus
                 required>

          <br>

          <!-- PASSWORD -->
          <input type="password"
                 name="password"
                 class="form-control"
                 placeholder="Password"
                 required>

          <label class="checkbox">
            <input type="checkbox" name="remember-me"> Remember me
          </label>

          <button class="btn btn-theme btn-block" type="submit">
            <i class="fa fa-lock"></i> SIGN IN
          </button>

          <hr>

          <!-- Admin accounts are seeded -->
        </div>
      </form>

    </div>
  </div>

  <!-- JS -->
  <script src="/admin/lib/jquery/jquery.min.js"></script>
  <script src="/admin/lib/bootstrap/js/bootstrap.min.js"></script>
  <script src="/admin/lib/jquery.backstretch.min.js"></script>

</body>
</html>
